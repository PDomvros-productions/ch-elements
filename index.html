<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>118 Elements – Flip Presentation</title>
  <style>
    :root {
      --bg1: #dcefff;
      --bg2: #f4f9ff;
      --nav-bg: rgba(13, 47, 95, 0.84);
      --nav-hover: rgba(13, 47, 95, 0.98);
      --text: #0d2f5f;
      --footer-bg: rgba(255, 255, 255, 0.92);
      --shadow: 0 20px 50px rgba(0, 34, 77, 0.16);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .presentation-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .viewport {
      position: absolute;
      inset: 10px 10px 76px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 2200px;
    }

    .stage {
      position: relative;
      width: 1200px;
      height: 675px;
      max-width: 100%;
      max-height: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: transparent;
    }

    .slide {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow: hidden;
      background: #ffffff;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      transform-origin: left center;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .slide.active,
    .slide.entering,
    .slide.leaving {
      opacity: 1;
      visibility: visible;
    }

    .slide.active {
      z-index: 2;
      pointer-events: auto;
      transform: rotateY(0deg);
    }

    .slide.entering,
    .slide.leaving {
      animation-duration: 0.82s;
      animation-timing-function: cubic-bezier(0.22, 0.61, 0.36, 1);
      animation-fill-mode: forwards;
    }

    .slide.entering { z-index: 3; }
    .slide.leaving { z-index: 4; }

    .slide.forward.entering { animation-name: flipInForward; }
    .slide.forward.leaving { animation-name: flipOutForward; }
    .slide.backward.entering {
      transform-origin: right center;
      animation-name: flipInBackward;
    }
    .slide.backward.leaving {
      transform-origin: right center;
      animation-name: flipOutBackward;
    }

    @keyframes flipOutForward {
      0% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
      100% { transform: rotateY(-90deg) scale(0.985); filter: brightness(0.88); }
    }

    @keyframes flipInForward {
      0% { transform: rotateY(90deg) scale(0.985); filter: brightness(0.88); }
      100% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
    }

    @keyframes flipOutBackward {
      0% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
      100% { transform: rotateY(90deg) scale(0.985); filter: brightness(0.88); }
    }

    @keyframes flipInBackward {
      0% { transform: rotateY(-90deg) scale(0.985); filter: brightness(0.88); }
      100% { transform: rotateY(0deg) scale(1); filter: brightness(1); }
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(13, 47, 95, 0.06);
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .brand {
      position: absolute;
      top: 6px;
      right: 6px;
      width: clamp(28px, 3.3vw, 46px);
      aspect-ratio: 1 / 1;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      padding: 3px;
      box-shadow: 0 6px 16px rgba(0, 34, 77, 0.14);
      z-index: 5;
    }

    .missing {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(180deg, #f7fbff, #e9f3ff);
      color: #0d2f5f;
      z-index: 1;
    }

    .missing.show { display: flex; }

    .missing-box {
      max-width: 780px;
      border: 2px dashed rgba(13, 47, 95, 0.25);
      border-radius: 24px;
      background: rgba(255,255,255,0.86);
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 34, 77, 0.08);
    }

    .missing-box h2 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 2.8vw, 2.6rem);
    }

    .missing-box p {
      margin: 10px 0;
      font-size: clamp(1rem, 1.7vw, 1.2rem);
      line-height: 1.5;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 50%;
      background: var(--nav-bg);
      color: white;
      font-size: 2rem;
      cursor: pointer;
      z-index: 10;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.16);
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      user-select: none;
    }

    .nav-btn:hover {
      background: var(--nav-hover);
      transform: translateY(-50%) scale(1.05);
    }

    .nav-btn.prev { left: 8px; }
    .nav-btn.next { right: 8px; }

    .footer {
      position: fixed;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 20;
      width: min(96vw, 1320px);
      text-align: center;
      background: var(--footer-bg);
      border-radius: 16px;
      padding: 10px 16px;
      box-shadow: 0 10px 24px rgba(0, 34, 77, 0.12);
      color: var(--text);
      font-size: clamp(0.78rem, 1.15vw, 0.98rem);
      line-height: 1.35;
      font-weight: 600;
    }

    .slide-counter {
      position: fixed;
      top: 10px;
      right: 14px;
      z-index: 20;
      background: rgba(255,255,255,0.84);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      box-shadow: 0 8px 20px rgba(0, 34, 77, 0.1);
      font-weight: 700;
      font-size: clamp(0.82rem, 1vw, 0.98rem);
      backdrop-filter: blur(8px);
    }

    .click-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 18%;
      z-index: 6;
    }

    .click-zone.left { left: 0; }
    .click-zone.right { right: 0; }

    @media (max-width: 900px) {
      .viewport { inset: 8px 8px 88px 8px; }
      .nav-btn { width: 50px; height: 50px; font-size: 1.7rem; }
      .nav-btn.prev { left: 4px; }
      .nav-btn.next { right: 4px; }
      .brand { top: 4px; right: 4px; width: 31px; padding: 2px; }
      .slide-counter { top: 8px; right: 10px; padding: 7px 12px; }
    }

    @media (max-width: 640px) {
      .viewport { inset: 6px 6px 100px 6px; }
      .footer { bottom: 8px; padding: 10px 12px; }
      .slide-counter { font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div class="presentation-shell">
    <div class="slide-counter" id="counter">Slide 1 / 119</div>
    <div class="viewport" id="viewport">
      <button class="nav-btn prev" id="prevBtn" aria-label="Previous slide">❮</button>
      <div class="stage" id="stage" aria-live="polite"></div>
      <button class="nav-btn next" id="nextBtn" aria-label="Next slide">❯</button>
    </div>
  </div>

  <div class="footer">
    Panagiotis Domvros, English &amp; Drama Teacher, ICT Teacher Trainer, Principal of 1st Middle School of Pylea
  </div>

  <script>
    const totalSlides = 119;
    const stage = document.getElementById('stage');
    const viewport = document.getElementById('viewport');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const counter = document.getElementById('counter');

    let currentIndex = 0;
    let isAnimating = false;
    let touchStartX = 0;
    let touchEndX = 0;
    let currentAspectRatio = 16 / 9;

    function getCandidates(index) {
      return [
        `${index + 1}.png`,
        `${index + 1}.jpg`,
        `${index + 1}.jpeg`,
        `${index + 1}.webp`
      ];
    }

    function tryImageSources(img, candidates, onDone) {
      let i = 0;
      function next() {
        if (i >= candidates.length) {
          onDone(false, null, null, null);
          return;
        }
        const candidate = candidates[i++];
        const tester = new Image();
        tester.onload = () => {
          img.src = candidate;
          onDone(true, candidate, tester.naturalWidth, tester.naturalHeight);
        };
        tester.onerror = next;
        tester.src = candidate;
      }
      next();
    }

    function sizeStage(ratio = currentAspectRatio) {
      const footer = document.querySelector('.footer');
      const footerHeight = footer ? footer.offsetHeight : 54;
      const viewportPaddingX = window.innerWidth <= 900 ? 16 : 28;
      const navAllowance = window.innerWidth <= 900 ? 68 : 86;
      const maxW = Math.max(280, window.innerWidth - (viewportPaddingX * 2) - navAllowance);
      const maxH = Math.max(220, window.innerHeight - footerHeight - 34);

      let width = maxW;
      let height = width / ratio;

      if (height > maxH) {
        height = maxH;
        width = height * ratio;
      }

      stage.style.width = `${Math.floor(width)}px`;
      stage.style.height = `${Math.floor(height)}px`;
    }

    function createSlide(index) {
      const slide = document.createElement('section');
      slide.className = 'slide';
      slide.setAttribute('role', 'group');
      slide.setAttribute('aria-label', `Slide ${index + 1} of ${totalSlides}`);
      slide.dataset.aspect = (16 / 9).toString();

      const img = document.createElement('img');
      img.className = 'main-image';
      img.alt = `Presentation slide ${index + 1}`;
      img.loading = index < 4 ? 'eager' : 'lazy';
      img.draggable = false;

      const missing = document.createElement('div');
      missing.className = 'missing';
      missing.innerHTML = `
        <div class="missing-box">
          <h2>Slide ${index + 1} not found</h2>
          <p>I tried loading <strong>${index + 1}.png</strong>, <strong>${index + 1}.jpg</strong>, <strong>${index + 1}.jpeg</strong>, and <strong>${index + 1}.webp</strong>.</p>
          <p>Keep this HTML file in the exact same folder as your numbered slide images and <strong>logo.png</strong>.</p>
        </div>
      `;

      const brand = document.createElement('img');
      brand.className = 'brand';
      brand.alt = 'Brand logo';
      brand.draggable = false;
      brand.src = 'logo.png';
      brand.onerror = () => {
        brand.style.display = 'none';
      };

      slide.appendChild(img);
      slide.appendChild(missing);
      slide.appendChild(brand);

      tryImageSources(img, getCandidates(index), (loaded, candidate, naturalWidth, naturalHeight) => {
        if (!loaded) {
          img.style.display = 'none';
          missing.classList.add('show');
          return;
        }

        if (naturalWidth && naturalHeight) {
          const ratio = naturalWidth / naturalHeight;
          slide.dataset.aspect = ratio.toString();
          if (index === currentIndex) {
            currentAspectRatio = ratio;
            sizeStage(ratio);
          }
        }
      });

      return slide;
    }

    const slides = Array.from({ length: totalSlides }, (_, index) => {
      const slide = createSlide(index);
      stage.appendChild(slide);
      return slide;
    });

    const leftZone = document.createElement('div');
    leftZone.className = 'click-zone left';
    leftZone.setAttribute('aria-hidden', 'true');

    const rightZone = document.createElement('div');
    rightZone.className = 'click-zone right';
    rightZone.setAttribute('aria-hidden', 'true');

    stage.appendChild(leftZone);
    stage.appendChild(rightZone);

    function updateUI() {
      counter.textContent = `Slide ${currentIndex + 1} / ${totalSlides}`;
      prevBtn.style.opacity = currentIndex === 0 ? '0.45' : '1';
      nextBtn.style.opacity = currentIndex === totalSlides - 1 ? '0.45' : '1';
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === totalSlides - 1;

      const ratio = parseFloat(slides[currentIndex].dataset.aspect || `${16 / 9}`);
      currentAspectRatio = ratio;
      sizeStage(ratio);
    }

    function setInitialSlide() {
      slides[0].classList.add('active');
      updateUI();
    }

    function goToSlide(newIndex) {
      if (isAnimating || newIndex === currentIndex || newIndex < 0 || newIndex >= totalSlides) return;

      isAnimating = true;
      const direction = newIndex > currentIndex ? 'forward' : 'backward';
      const currentSlide = slides[currentIndex];
      const nextSlide = slides[newIndex];

      currentSlide.classList.remove('active', 'forward', 'backward', 'entering', 'leaving');
      nextSlide.classList.remove('active', 'forward', 'backward', 'entering', 'leaving');

      currentSlide.classList.add(direction, 'leaving');
      nextSlide.classList.add(direction, 'entering');

      const cleanup = () => {
        currentSlide.classList.remove('active', 'forward', 'backward', 'entering', 'leaving');
        nextSlide.classList.remove('forward', 'backward', 'entering', 'leaving');
        nextSlide.classList.add('active');
        currentIndex = newIndex;
        updateUI();
        isAnimating = false;
      };

      nextSlide.addEventListener('animationend', cleanup, { once: true });
    }

    function nextSlide() {
      if (currentIndex < totalSlides - 1) goToSlide(currentIndex + 1);
    }

    function prevSlide() {
      if (currentIndex > 0) goToSlide(currentIndex - 1);
    }

    prevBtn.addEventListener('click', prevSlide);
    nextBtn.addEventListener('click', nextSlide);
    leftZone.addEventListener('click', prevSlide);
    rightZone.addEventListener('click', nextSlide);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') {
        event.preventDefault();
        nextSlide();
      }
      if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
        event.preventDefault();
        prevSlide();
      }
      if (event.key === 'Home') {
        event.preventDefault();
        goToSlide(0);
      }
      if (event.key === 'End') {
        event.preventDefault();
        goToSlide(totalSlides - 1);
      }
      if (event.key.toLowerCase() === 'f') {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      }
    });

    stage.addEventListener('touchstart', (event) => {
      touchStartX = event.changedTouches[0].screenX;
    }, { passive: true });

    stage.addEventListener('touchend', (event) => {
      touchEndX = event.changedTouches[0].screenX;
      const distance = touchEndX - touchStartX;
      if (Math.abs(distance) < 45) return;
      if (distance < 0) nextSlide();
      else prevSlide();
    }, { passive: true });

    window.addEventListener('resize', () => sizeStage(currentAspectRatio));

    setInitialSlide();
    sizeStage(currentAspectRatio);
  </script>
</body>
</html>
